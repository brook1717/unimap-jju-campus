services:
  # ─── PostGIS Database ─────────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: unimap_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unimap_db}
      POSTGRES_USER: ${POSTGRES_USER:-unimap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unimap_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unimap_user} -d ${POSTGRES_DB:-unimap_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - unimap-network

  # ─── Django / Gunicorn Backend ────────────────────────────────────────────
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unimap_web
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./data:/data:ro
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unimap-network

volumes:
  postgres_data:
  static_files:
  media_files:

networks:
  unimap-network:
    driver: bridge
