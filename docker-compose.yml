version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: unimap_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: unimap_db
      POSTGRES_USER: unimap_user
      POSTGRES_PASSWORD: unimap_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unimap_user -d unimap_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - unimap-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unimap_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-insecure-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      POSTGRES_DB: unimap_db
      POSTGRES_USER: unimap_user
      POSTGRES_PASSWORD: unimap_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unimap-network

volumes:
  postgres_data:

networks:
  unimap-network:
    driver: bridge
